<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Остановка Мира: Прогрессия</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; user-select: none; }
        canvas { display: block; }
        
        /* Стили для UI шкалы */
        #ui-container {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 300px; text-align: center;
            font-family: 'Courier New', monospace; color: #ff3300;
            text-shadow: 0 0 5px #ff3300;
            pointer-events: none; /* Чтобы мышь не мешала */
        }
        #bar-bg { width: 100%; height: 10px; background: rgba(255,51,0,0.2); border: 1px solid #ff3300; margin-top: 5px; }
        #bar-fill { width: 0%; height: 100%; background: #ff3300; transition: width 0.1s linear; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
    </style>
</head>
<body>

<div id="crosshair"></div>

<div id="ui-container">
    <div>ОСТАНОВКА МИРА: <span id="percent-text">0</span>%</div>
    <div id="bar-bg"><div id="bar-fill"></div></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

    // --- Переменные Логики ---
    let worldStopPercent = 0;
    const LOOK_SPEED = 0.15; // Скорость набора процентов в секунду
    const DECAY_SPEED = 0.1; // Скорость падения, если не смотрим

    // HTML Элементы
    const uiPercentText = document.getElementById('percent-text');
    const uiBarFill = document.getElementById('bar-fill');

    // --- Инициализация Базы ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const loader = new THREE.TextureLoader();

    // --- Загрузка Текстур ---
    // (Используем заглушки, если файлы не найдены, чтобы код не падал)
    function loadTex(url) {
        return loader.load(url, undefined, undefined, () => {
            console.warn(`Файл ${url} не найден. Используется заглушка.`);
        });
    }

    const texFloor = loadTex('i (2).jpeg');
    texFloor.wrapS = texFloor.wrapT = THREE.RepeatWrapping; texFloor.repeat.set(4, 4);

    const texWall = loadTex('photo-wall-texture-pattern_58702-12902.jpg');
    texWall.wrapS = texWall.wrapT = THREE.RepeatWrapping; texWall.repeat.set(2, 1);

    const texArt = loadTex('InShot_20260322_110800776.jpg');
    const texNewReal = loadTex('i.jpeg'); // Текстура для 80-100%

    // --- Построение Комнаты (Геометрия) ---
    // Пол
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ map: texFloor }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Стены (коробка вокруг)
    const wallMat = new THREE.MeshStandardMaterial({ map: texWall, side: THREE.BackSide });
    const roomWalls = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 20), wallMat);
    roomWalls.position.y = 5;
    scene.add(roomWalls);

    // Картина
    const painting = new THREE.Mesh(
        new THREE.PlaneGeometry(4, 3),
        new THREE.MeshStandardMaterial({ map: texArt })
    );
    painting.position.set(0, 5, -9.9); // На дальней стене
    scene.add(painting);

    // Свет
    scene.add(new THREE.AmbientLight(0x404040, 1));
    const light = new THREE.PointLight(0xffffff, 80, 30);
    light.position.set(0, 8, -5);
    scene.add(light);

    // --- Управление ---
    const controls = new PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());
    camera.position.set(0, 1.7, 5);

    // --- Raycaster (Проверка взгляда) ---
    const raycaster = new THREE.Raycaster();
    const centerScreen = new THREE.Vector2(0, 0);


    // ==========================================
    // --- ПОСТ-ОБРАБОТКА (СЕРДЦЕ ЭФФЕКТОВ) ---
    // ==========================================

    const composer = new EffectComposer(renderer);
    
    // 1. Основной проход рендера сцены
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // 2. Шейдерный проход "Остановка Мира"
    // Этот шейдер принимает готовую картинку мира и меняет её по фазам.

    const WorldStopShader = {
        uniforms: {
            "tDiffuse": { value: null },   // Текстура отрендеренной сцены
            "tNewReal": { value: texNewReal }, // Новая реальность
            "uTime":    { value: 0 },
            "uPercent": { value: 0 }    // 0.0 - 1.0
        },
        vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform sampler2D tNewReal;
            uniform float uTime;
            uniform float uPercent; // Приходит как 0.0 - 1.0
            varying vec2 vUv;

            // Функция псевдо-случайных чисел для галлюцинаций
            float hash(vec2 p) {
                p = fract(p * vec2(123.34, 456.21));
                p += dot(p, p + 45.32);
                return fract(p.x * p.y);
            }

            void main() {
                vec2 uv = vUv;
                float p = uPercent * 100.0; // Работаем в удобных 0-100
                
                // --- 1. ЛОГИКА ТУННЕЛЯ (50% - 80%) ---
                if (p >= 50.0 && p < 80.0) {
                    float tunnelProg = (p - 50.0) / 30.0; // 0.0 -> 1.0 внутри фазы
                    // Центрируем UV для масштабирования
                    vec2 centeredUv = uv - 0.5;
                    
                    // Создаем 5 слоев размножения
                    vec3 tunnelColor = vec3(0.0);
                    for(float i=0.0; i<5.0; i++) {
                        float scale = 1.0 + i * 0.5 + sin(uTime * 0.5 + i) * 0.2 * tunnelProg;
                        vec2 shiftedUv = centeredUv * scale + 0.5;
                        
                        // Берем цвет, только если UV в пределах экрана
                        if(shiftedUv.x >=0.0 && shiftedUv.x <=1.0 && shiftedUv.y >=0.0 && shiftedUv.y <=1.0) {
                            vec3 col = texture2D(tDiffuse, shiftedUv).rgb;
                            // Смешиваем слои
                            tunnelColor = mix(tunnelColor, col, 0.5 + 0.5 * sin(uTime + i));
                        }
                    }
                    gl_FragColor = vec4(tunnelColor, 1.0);
                    return; // Выходим, туннель заменяет собой всё до этого
                }


                // --- 2. МАРЕВО (ИСКАЖЕНИЕ UV) ---
                float distortIntensity = 0.0;
                if (p > 0.0 && p < 10.0) {
                    distortIntensity = (p / 10.0) * 0.002; // Очень слабое
                } else if (p >= 10.0 && p < 100.0) {
                    distortIntensity = 0.002 + ((p - 10.0) / 90.0) * 0.02; // Усиливается
                } else if (p >= 100.0) {
                    distortIntensity = 0.003; // Легкое марево на 100%
                }

                if (distortIntensity > 0.0) {
                    float speed = 5.0;
                    if (p >= 100.0) speed = 1.0; // Медленное на 100%
                    uv.x += sin(uv.y * 20.0 + uTime * speed) * distortIntensity;
                    uv.y += cos(uv.x * 20.0 + uTime * speed) * distortIntensity;
                }

                // Получаем базовый цвет сцены (возможно искаженный)
                vec4 baseColor = texture2D(tDiffuse, uv);
                vec3 finalColor = baseColor.rgb;


                // --- 3. КОНТРАСТ (10% - 50%) ---
                if (p >= 10.0 && p < 50.0) {
                    float contrastProg = (p - 10.0) / 40.0; // 0 -> 1
                    float contrast = 1.0 + contrastProg * 1.5; // Увеличение контраста
                    // Формула контраста: t = (c - 0.5) * contrast + 0.5
                    finalColor = (finalColor - 0.5) * contrast + 0.5;
                }


                // --- 4. ГАЛЛЮЦИНАЦИИ (20% - 50%) ---
                // Исчезают на 50% из-за return в туннеле, но добавим явное условие
                if (p >= 20.0 && p < 50.0) {
                    // Генерируем "зерно" на основе координат и времени
                    float noise = hash(floor(uv * 50.0)); // Статические квадраты
                    float flicker = sin(uTime * 10.0 + noise * 100.0);
                    
                    // Появляются силуэты ("человечки")
                    float shape = step(0.98, hash(floor(uv * 20.0) + floor(uTime * 0.1)));
                    
                    if (p < 35.0) {
                        // 20-35%: Серые, статические
                        float grayHalu = noise * 0.05 * flicker; // Едва заметные
                        finalColor += vec3(grayHalu);
                    } else {
                        // 35-50%: Явные, цветные, двигаются
                        float speedHalu = hash(floor(uv * 30.0 + uTime * 2.0));
                        vec3 colorHalu = vec3(
                            hash(floor(uv * 30.0 + 1.0)),
                            hash(floor(uv * 30.0 + 2.0)),
                            hash(floor(uv * 30.0 + 3.0))
                        );
                        
                        finalColor = mix(finalColor, colorHalu, step(0.95, speedHalu) * 0.3);
                    }
                }


                // --- 5. ЗАМЕНА РЕАЛЬНОСТИ (80% - 100%) ---
                if (p >= 80.0) {
                    float blendProg = (p - 80.0) / 20.0; // 0.0 -> 1.0
                    vec3 newRealColor = texture2D(tNewReal, vUv).rgb; // UV без искажений для новой реальности
                    finalColor = mix(finalColor, newRealColor, blendProg);
                }

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `
    };

    const worldStopPass = new ShaderPass(WorldStopShader);
    composer.addPass(worldStopPass);


    // --- Основной цикл анимации ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        
        const delta = clock.getDelta();
        const time = clock.getElapsedTime();

        // 1. Логика Raycaster (смотрим ли на картину)
        if (controls.isLocked) {
            raycaster.setFromCamera(centerScreen, camera);
            const intersects = raycaster.intersectObject(painting);

            if (intersects.length > 0) {
                // Смотрим -> Процент растет
                worldStopPercent = Math.min(100, worldStopPercent + LOOK_SPEED * delta * 100);
            } else {
                // Не смотрим -> Процент падает
                if (worldStopPercent < 100) {
                    worldStopPercent = Math.max(0, worldStopPercent - DECAY_SPEED * delta * 100);
                }
                // Если достиг 100%, он там и остается
            }
        }

        // 2. Обновление UI
        const roundedPass = Math.round(worldStopPercent);
        uiPercentText.innerText = roundedPass;
        uiBarFill.style.width = roundedPass + '%';

        // 3. Передача данных в Шейдер
        worldStopPass.uniforms['uTime'].value = time;
        worldStopPass.uniforms['uPercent'].value = worldStopPercent / 100.0; // Преобразуем 0-100 в 0.0-1.0

        // 4. Рендер через Композитор (а не renderer.render)
        composer.render();
    }

    animate();

    // Ресайз окна
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
