<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сумрак: Эффект Жары - Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; color: white; pointer-events: none; z-index: 5;
        }
        #progress-container {
            width: 100%; height: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3); margin-top: 5px;
        }
        #progress-bar { width: 0%; height: 100%; background: #ff4500; transition: width 0.1s; }
        #percent { font-size: 14px; margin-top: 2px; }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; z-index: 10;
        }

        #blocker {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="blocker">
    <h2>СОЗЕРЦАНИЕ</h2>
    <p>Нажми, чтобы начать</p>
    <p style="font-size: 12px; color: #ccc;">Слева — джойстик для ходьбы<br>Справа — вращение камерой пальцем</p>
</div>

<div id="ui">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="percent">0%</div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
    
    // Подключаем Composer для эффектов
    import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
    import { ShaderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/ShaderPass.js';

    let camera, scene, renderer, pictureMesh;
    let composer, heatHazePass; // Переменные для эффектов
    let progression = 0;
    let isMoving = false;
    let moveDirection = { x: 0, z: 0 };

    let lon = 0, lat = 0;
    let onPointerDownPointerX = 0, onPointerDownPointerY = 0;
    let onPointerDownLon = 0, onPointerDownLat = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Для производительности на Retina
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const spot = new THREE.SpotLight(0xfff0dd, 5, 15, Math.PI/6);
        spot.position.set(0, 4, 2);
        scene.add(spot);

        const loader = new THREE.TextureLoader();

        // Пол и Стены (упрощенная загрузка)
        const wallTex = loader.load('https://threejs.org/examples/textures/crate.gif'); // Временная текстура
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(4, 2);
        const wallMaterial = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 12), wallMaterial);
        room.position.y = 2.5;
        scene.add(room);

        // Картина
        const picTex = loader.load('https://threejs.org/examples/textures/758px-Canine_skull_lateral_view.jpg'); // Временная текстура
        pictureMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(2, 2.5),
            new THREE.MeshStandardMaterial({ map: picTex })
        );
        pictureMesh.position.set(0, 1.8, -5.9);
        pictureMesh.name = "target_picture";
        scene.add(pictureMesh);

        // --- НАСТРОЙКА ПОСТ-ПРОЦЕССИНГА (HEAT HAZE) ---

        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        // Определение GLSL шейдера горячего воздуха
        const HeatHazeShader = {
            uniforms: {
                "tDiffuse": { value: null }, // Текстура экрана
                "time": { value: 0.0 },      // Время для анимации
                "factor": { value: 0.0 }     // Сила эффекта (от 0 до 1)
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float time;
                uniform float factor;
                varying vec2 vUv;

                void main() {
                    // Создаем искажение на основе синусоид
                    // vUv.y * 60.0 - частота полос по вертикали
                    // time * 4.0 - скорость движения
                    float distortion = sin(vUv.y * 60.0 + time * 4.0) * 0.005 * factor;
                    
                    // Добавляем вторую волну для хаотичности
                    distortion += sin(vUv.x * 40.0 + time * 2.0) * 0.002 * factor;

                    // Сдвигаем координаты выборки пикселя
                    vec2 distortedUv = vec2(vUv.x + distortion, vUv.y + distortion);
                    
                    // Берем цвет пикселя из сдвинутых координат
                    gl_FragColor = texture2D(tDiffuse, distortedUv);
                }
            `
        };

        heatHazePass = new ShaderPass(HeatHazeShader);
        composer.addPass(heatHazePass);


        // --- МОБИЛЬНОЕ УПРАВЛЕНИЕ (без изменений) ---

        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white'
        });

        joystick.on('move', (evt, data) => {
            isMoving = true;
            const forward = data.vector.y;
            const side = data.vector.x;
            moveDirection.z = -forward * 0.1;
            moveDirection.x = side * 0.1;
        });

        joystick.on('end', () => {
            isMoving = false;
            moveDirection = { x: 0, z: 0 };
        });

        document.addEventListener('pointerdown', (e) => {
            if (e.clientX > window.innerWidth / 2) {
                onPointerDownPointerX = e.clientX;
                onPointerDownPointerY = e.clientY;
                onPointerDownLon = lon;
                onPointerDownLat = lat;
                document.addEventListener('pointermove', onPointerMove);
                document.addEventListener('pointerup', onPointerUp);
            }
        });

        document.getElementById('blocker').onclick = () => {
            document.getElementById('blocker').style.display = 'none';
        };
    }

    function onPointerMove(e) {
        lon = (onPointerDownPointerX - e.clientX) * 0.1 + onPointerDownLon;
        lat = (e.clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat;
        lat = Math.max(-85, Math.min(85, lat));
    }

    function onPointerUp() {
        document.removeEventListener('pointermove', onPointerMove);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Обновление камеры
        let phi = THREE.MathUtils.degToRad(90 - lat);
        let theta = THREE.MathUtils.degToRad(lon);
        const target = new THREE.Vector3();
        target.setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        // Движение
        if (isMoving) {
            camera.translateZ(moveDirection.z);
            camera.translateX(moveDirection.x);
            camera.position.y = 1.7;
        }

        // Обновление времени для шейдера
        heatHazePass.uniforms[ "time" ].value += 0.01;

        checkProgression();
        
        // Рендерим через Composer, а не renderer
        composer.render(); 
    }

    function checkProgression() {
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(scene.children);
        const lookingAtPic = intersects.length > 0 && intersects[0].object.name === "target_picture";

        if (!isMoving && lookingAtPic) {
            progression = Math.min(progression + 0.3, 100);
        } else {
            progression = Math.max(progression - 1.0, 0);
        }

        document.getElementById('progress-bar').style.width = progression + '%';
        document.getElementById('percent').innerText = Math.floor(progression) + '%';
        
        applyVisuals(progression);
    }

    function applyVisuals(p) {
        // Привязываем силу Heat Haze к прогрессу
        // Эффект начинается с 10% прогресса и плавно нарастает
        if (p > 10) {
            heatHazePass.enabled = true;
            heatHazePass.uniforms[ "factor" ].value = (p - 10) / 90.0; // от 0.0 до 1.0
        } else {
            heatHazePass.enabled = false;
            heatHazePass.uniforms[ "factor" ].value = 0.0;
        }

        // Дополнительный эффект: покраснение картины
        if (p > 50) {
            pictureMesh.material.emissive = new THREE.Color(0xff0000);
            pictureMesh.material.emissiveIntensity = (p - 50) * 0.02;
        } else {
            pictureMesh.material.emissiveIntensity = 0;
        }
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight); // Важно для composer
    };
</script>
</body>
</html>
