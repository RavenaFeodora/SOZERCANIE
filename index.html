<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вхождение в сумрак - Mobile Heat</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; color: white; pointer-events: none; z-index: 5;
        }
        #progress-container {
            width: 100%; height: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3); margin-top: 5px;
        }
        #progress-bar { width: 0%; height: 100%; background: #ff4500; }
        #percent { font-size: 14px; margin-top: 2px; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10; opacity: 0.6; }
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="blocker">
    <h2>ВХОЖДЕНИЕ В СУМРАК</h2>
    <p>Нажми, чтобы начать</p>
    <p style="font-size: 12px; color: #ccc;">Джойстик слева — ходьба<br>Справа — обзор</p>
</div>

<div id="ui">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="percent">0%</div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
    import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
    import { ShaderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/ShaderPass.js';

    let camera, scene, renderer, pictureMesh, wallMaterial, clock, composer, heatPass;
    let progression = 0;
    let isMoving = false, isRotating = false;
    let moveDirection = { x: 0, z: 0 };
    let lon = 0, lat = 0;
    let onPointerDownX = 0, onPointerDownY = 0, onPointerDownLon = 0, onPointerDownLat = 0;

    const HeatShader = {
        uniforms: { "tDiffuse": { value: null }, "time": { value: 0.0 }, "factor": { value: 0.0 } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform sampler2D tDiffuse; uniform float time; uniform float factor; varying vec2 vUv;
            void main() {
                vec2 distort = vec2(sin(vUv.y * 15.0 + time * 3.0), cos(vUv.x * 15.0 + time * 3.0)) * 0.012 * factor;
                gl_FragColor = texture2D(tDiffuse, vUv + distort) + vec4(0.1, 0.0, 0.0, 0.0) * factor * 0.3;
            }`
    };

    init();
    animate();

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const spot = new THREE.SpotLight(0xfff0dd, 8);
        spot.position.set(0, 4, 2);
        scene.add(spot);

        const loader = new THREE.TextureLoader();

        // --- ТВОИ ОРИГИНАЛЬНЫЕ ТЕКСТУРЫ ---
        const wallTex = loader.load('photo-wall-texture-pattern_58702-12902.jpg');
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(4, 2);
        wallMaterial = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide });
        
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 12), wallMaterial);
        room.position.y = 2.5;
        scene.add(room);

        loader.load('InShot_20260322_110800776.jpg', (tex) => {
            const aspect = tex.image.width / tex.image.height;
            pictureMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(2 * aspect, 2),
                new THREE.MeshStandardMaterial({ map: tex, emissive: 0xff0000, emissiveIntensity: 0 })
            );
            pictureMesh.position.set(0, 1.8, -5.9);
            pictureMesh.name = "target_picture";
            scene.add(pictureMesh);
        });

        // Постобработка
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        heatPass = new ShaderPass(HeatShader);
        composer.addPass(heatPass);

        // Управление
        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static', position: { left: '60px', bottom: '60px' }, color: 'white'
        });

        joystick.on('move', (evt, data) => {
            isMoving = true;
            moveDirection.z = -data.vector.y * 0.1;
            moveDirection.x = data.vector.x * 0.1;
        });
        joystick.on('end', () => { isMoving = false; moveDirection = { x: 0, z: 0 }; });

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.clientX > window.innerWidth / 2) {
                isRotating = true;
                onPointerDownX = e.clientX; onPointerDownY = e.clientY;
                onPointerDownLon = lon; onPointerDownLat = lat;
            }
        });
        window.addEventListener('pointermove', (e) => {
            if (isRotating) {
                lon = (onPointerDownX - e.clientX) * 0.1 + onPointerDownLon;
                lat = (e.clientY - onPointerDownY) * 0.1 + onPointerDownLat;
                lat = Math.max(-85, Math.min(85, lat));
            }
        });
        window.addEventListener('pointerup', () => isRotating = false);
        document.getElementById('blocker').onclick = () => document.getElementById('blocker').style.display = 'none';
    }

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);
        const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        if (isMoving) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0));
            camera.position.addScaledVector(forward, -moveDirection.z);
            camera.position.addScaledVector(right, moveDirection.x);
        }

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(scene.children);
        const looking = intersects.length > 0 && intersects[0].object.name === "target_picture";

        if (!isMoving && !isRotating && looking) {
            progression = Math.min(progression + 0.4, 100);
        } else {
            progression = Math.max(progression - 1.5, 0);
        }

        document.getElementById('progress-bar').style.width = progression + '%';
        document.getElementById('percent').innerText = Math.floor(progression) + '%';
        
        heatPass.uniforms.time.value = elapsed;
        heatPass.uniforms.factor.value = progression / 100;
        if(pictureMesh) pictureMesh.material.emissiveIntensity = progression / 50;

        composer.render();
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
