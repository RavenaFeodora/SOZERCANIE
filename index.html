<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Stop Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; z-index: 100; pointer-events: none;
        }
        #bar-container { width: 200px; height: 10px; border: 1px solid white; margin-top: 5px; }
        #bar { width: 0%; height: 100%; background: red; transition: width 0.1s; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>ОСТАНОВКА МИРА</div>
        <div id="bar-container"><div id="bar"></div></div>
        <div id="percent">0%</div>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, clock, raycaster;
        let painting, worldProgress = 0;
        let targetProgress = 0;
        
        // Шейдерный материал для постобработки
        let postMaterial;
        const center = new THREE.Vector2(0, 0);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            const loader = new THREE.TextureLoader();
            const wallTex = loader.load('photo-wall-texture-pattern_58702-12902.jpg');
            const paintingTex = loader.load('InShot_20260322_110800776.jpg');
            const secondWorldTex = loader.load('i.jpeg'); // Новая реальность

            // Комната (без пола)
            const roomGeo = new THREE.BoxGeometry(20, 10, 20);
            const roomMat = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide });
            const room = new THREE.Mesh(roomGeo, roomMat);
            room.position.y = 5;
            scene.add(room);

            // Картина
            painting = new THREE.Mesh(
                new THREE.PlaneGeometry(4, 5),
                new THREE.MeshStandardMaterial({ map: paintingTex })
            );
            painting.position.set(0, 5, -9.8);
            scene.add(painting);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // --- ПОСТОБРАБОТКА (Render Target для эффектов) ---
            const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            
            postMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: null },
                    tSecondWorld: { value: secondWorldTex },
                    time: { value: 0.0 },
                    progress: { value: 0.0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform sampler2D tSecondWorld;
                    uniform float time;
                    uniform float progress;
                    varying vec2 vUv;

                    // Функция для создания шума (галлюцинаций)
                    float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

                    void main() {
                        vec2 uv = vUv;
                        float p = progress;

                        // 1. МАРЕВО (усиливается нелинейно)
                        float distAmp = (p < 0.1) ? p * 0.05 : p * 0.2;
                        if (p >= 1.0) distAmp = 0.02; // Легкое марево на 100%
                        uv.x += sin(uv.y * 15.0 + time * 3.0) * distAmp * 0.1;
                        uv.y += cos(uv.x * 15.0 + time * 3.0) * distAmp * 0.1;

                        // 2. ЭФФЕКТ ТУННЕЛЯ (50% - 79%)
                        if (p >= 0.5 && p < 0.8) {
                            float zoom = mod(time * 0.5, 0.5) + 0.5;
                            uv = (uv - 0.5) * zoom + 0.5;
                        }

                        vec4 color = texture2D(tDiffuse, uv);
                        vec4 secondWorld = texture2D(tSecondWorld, uv);

                        // 3. КОНТРАСТ (от 10%)
                        if (p > 0.1) {
                            float contrast = 1.0 + (p - 0.1) * 2.0;
                            color.rgb = (color.rgb - 0.5) * contrast + 0.5;
                        }

                        // 4. ГАЛЛЮЦИНАЦИИ (20% - 49%)
                        if (p >= 0.2 && p < 0.5) {
                            float h = hash(floor(uv * 20.0 + time * 0.1));
                            if (h > 0.98) {
                                vec3 halluColor = (p > 0.35) ? vec3(sin(time), cos(time), 1.0) : vec3(0.5);
                                color.rgb += halluColor * 0.3;
                            }
                        }

                        // 5. СМЕНА РЕАЛЬНОСТИ (от 80% до 100%)
                        if (p >= 0.8) {
                            float mixFactor = (p - 0.8) / 0.2;
                            color = mix(color, secondWorld, mixFactor);
                        }

                        gl_FragColor = color;
                    }
                `
            });

            const postScene = new THREE.Scene();
            const postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const postQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMaterial);
            postScene.add(postQuad);

            // Рендерим сцену в текстуру, а потом применяем шейдер
            this.customRender = () => {
                renderer.setRenderTarget(renderTarget);
                renderer.render(scene, camera);
                renderer.setRenderTarget(null);
                postMaterial.uniforms.tDiffuse.value = renderTarget.texture;
                renderer.render(postScene, postCamera);
            };

            // Управление (Android)
            let lastTouchX = 0, lastTouchY = 0;
            window.addEventListener('touchstart', e => { lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY; });
            window.addEventListener('touchmove', e => {
                const dx = e.touches[0].pageX - lastTouchX;
                const dy = e.touches[0].pageY - lastTouchY;
                camera.rotation.y -= dx * 0.005;
                camera.rotation.x -= dy * 0.005;
                lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            // Проверка взгляда на картину
            raycaster.setFromCamera(center, camera);
            const hit = raycaster.intersectObject(painting);

            if (hit.length > 0) {
                targetProgress = Math.min(targetProgress + dt * 5, 100); // Скорость роста %
            }

            // Плавное движение шкалы
            worldProgress = THREE.MathUtils.lerp(worldProgress, targetProgress, 0.1);
            
            // Обновление UI
            document.getElementById('bar').style.width = worldProgress + '%';
            document.getElementById('percent').innerText = Math.floor(worldProgress) + '%';

            // Передача данных в шейдер
            postMaterial.uniforms.time.value = elapsed;
            postMaterial.uniforms.progress.value = worldProgress / 100;

            this.customRender();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
