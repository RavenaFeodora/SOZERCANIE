<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вхождение в сумрак - Mobile Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        /* Слой инструкции - теперь с высоким z-index и touch-action */
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
            cursor: pointer; touch-action: auto;
        }

        #ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; color: white; pointer-events: none; z-index: 50;
        }
        #progress-container {
            width: 100%; height: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3); margin-top: 5px;
        }
        #progress-bar { width: 0%; height: 100%; background: #ff4500; }
        #percent { font-size: 14px; margin-top: 2px; }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; z-index: 60; opacity: 0.6;
        }
    </style>
</head>
<body>

<div id="blocker">
    <h2 style="margin-bottom: 10px;">ВХОЖДЕНИЕ В СУМРАК</h2>
    <p style="background: #ff4500; padding: 15px 30px; border-radius: 5px; font-weight: bold;">НАЖМИ, ЧТОБЫ НАЧАТЬ</p>
    <p style="font-size: 12px; color: #ccc; margin-top: 20px;">Слева — джойстик (ходьба)<br>Справа — вращение камерой</p>
</div>

<div id="ui">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="percent">0%</div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
    import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
    import { ShaderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/ShaderPass.js';

    let camera, scene, renderer, pictureMesh, clock, composer, heatPass;
    let progression = 0;
    let isMoving = false, isRotating = false, isStarted = false;
    let moveDirection = { x: 0, z: 0 };
    let lon = 0, lat = 0;
    let onPointerDownX = 0, onPointerDownY = 0, onPointerDownLon = 0, onPointerDownLat = 0;

    // Шейдер горячего воздуха
    const HeatShader = {
        uniforms: { "tDiffuse": { value: null }, "time": { value: 0.0 }, "factor": { value: 0.0 } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform sampler2D tDiffuse; uniform float time; uniform float factor; varying vec2 vUv;
            void main() {
                vec2 distort = vec2(sin(vUv.y * 10.0 + time * 2.5), cos(vUv.x * 10.0 + time * 2.5)) * 0.015 * factor;
                vec4 tex = texture2D(tDiffuse, vUv + distort);
                gl_FragColor = tex + vec4(0.1, 0.0, 0.0, 0.0) * factor * 0.4;
            }`
    };

    init();
    animate();

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const spot = new THREE.SpotLight(0xfff0dd, 8);
        spot.position.set(0, 4, 2);
        scene.add(spot);

        const loader = new THREE.TextureLoader();

        // --- ТВОИ ТЕКСТУРЫ ---
        const wallTex = loader.load('photo-wall-texture-pattern_58702-12902.jpg');
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(4, 2);
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 12), new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide }));
        room.position.y = 2.5;
        scene.add(room);

        loader.load('InShot_20260322_110800776.jpg', (tex) => {
            const aspect = tex.image.width / tex.image.height;
            pictureMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(2 * aspect, 2),
                new THREE.MeshStandardMaterial({ map: tex, emissive: 0xff0000, emissiveIntensity: 0 })
            );
            pictureMesh.position.set(0, 1.8, -5.9);
            pictureMesh.name = "target_picture";
            scene.add(pictureMesh);
        });

        // Постобработка
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        heatPass = new ShaderPass(HeatShader);
        composer.addPass(heatPass);

        // --- СТАРТ И УПРАВЛЕНИЕ ---
        const blocker = document.getElementById('blocker');
        const startAction = () => {
            blocker.style.display = 'none';
            isStarted = true;
            // Инициализация джойстика после нажатия
            initJoystick();
        };
        blocker.addEventListener('click', startAction);
        blocker.addEventListener('touchend', (e) => { e.preventDefault(); startAction(); });

        function initJoystick() {
            const joystick = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static', position: { left: '60px', bottom: '60px' }, color: 'white'
            });
            joystick.on('move', (evt, data) => {
                isMoving = true;
                moveDirection.z = -data.vector.y * 0.1;
                moveDirection.x = data.vector.x * 0.1;
            });
            joystick.on('end', () => { isMoving = false; moveDirection = { x: 0, z: 0 }; });
        }

        // Вращение (только правая часть)
        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (isStarted && e.clientX > window.innerWidth / 2) {
                isRotating = true;
                onPointerDownX = e.clientX; onPointerDownY = e.clientY;
