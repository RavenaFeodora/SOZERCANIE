<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Room - Touch Support</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 300px;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        #progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin-top: 5px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00ffcc;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        /* Стили для джойстика */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            z-index: 20;
            display: none; /* Появится на тач-устройствах */
            touch-action: none;
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Остановка Мира</h2>
        <p>ПК: Нажмите для старта (WASD + Мышь)</p>
        <p>Сенсор: Используйте джойстик слева и экран справа</p>
        <button style="padding: 10px 20px; margin-top: 10px; cursor:pointer;">ИГРАТЬ</button>
    </div>

    <div id="ui">
        <div id="status-text">ОСТАНОВКА МИРА: 0%</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <script>
        const TEXTURE_FLOOR = 'i (2).jpeg';
        const TEXTURE_WALL = 'photo-wall-texture-pattern_58702-12902.jpg';
        const TEXTURE_PAINTING = 'InShot_20260322_110800776.jpg';
        const TEXTURE_NEW_REALITY = 'i.jpeg';

        let scene, camera, renderer, clock;
        let progress = 0;
        let isLookingAtPainting = false;
        let roomMaterials = [];
        let hallucinations = [];
        let postMaterial, composerScene, composerCamera;

        // Состояние управления
        const moveState = { forward: 0, backward: 0, left: 0, right: 0 };
        let yaw = 0, pitch = 0; // Для вращения камеры
        let isPointerLocked = false;

        // Сенсорные переменные
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        let joystickActive = false;
        let touchStartX = 0, touchStartY = 0;
        let lookTouchId = null;
        let lastLookX = 0, lastLookY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Свет
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const pl = new THREE.PointLight(0xffffff, 0.8);
            pl.position.set(0, 4, 0);
            scene.add(pl);

            // Текстуры
            const loader = new THREE.TextureLoader();
            const floorTex = loader.load(TEXTURE_FLOOR);
            const wallTex = loader.load(TEXTURE_WALL);
            const paintTex = loader.load(TEXTURE_PAINTING);
            [floorTex, wallTex].forEach(t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(2, 2); });

            // Комната
            const geoBox = new THREE.BoxGeometry(10, 6, 10);
            const materials = [
                new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide }), // right
                new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide }), // left
                new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.BackSide }), // top
                new THREE.MeshStandardMaterial({ map: floorTex, side: THREE.BackSide }), // bottom
                new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide }), // back
                new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide })  // front
            ];
            const room = new THREE.Mesh(geoBox, materials);
            scene.add(room);
            roomMaterials = materials;

            // Картина
            const painting = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 2),
                new THREE.MeshStandardMaterial({ map: paintTex })
            );
            painting.position.set(0, 0, -4.95);
            painting.name = "painting";
            scene.add(painting);

            createHallucinations();
            setupPostProcessing();
            setupControls();

            if (isTouchDevice) {
                document.getElementById('joystick-container').style.display = 'block';
            }

            animate();
        }

        function setupControls() {
            const inst = document.getElementById('instructions');
            
            inst.addEventListener('click', () => {
                inst.style.display = 'none';
                if (!isTouchDevice) {
                    renderer.domElement.requestPointerLock();
                }
            });

            // Мышь (ПК)
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                }
            });

            // Клавиатура (ПК)
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') moveState.forward = 1;
                if (e.code === 'KeyS') moveState.backward = 1;
                if (e.code === 'KeyA') moveState.left = 1;
                if (e.code === 'KeyD') moveState.right = 1;
            });
            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') moveState.forward = 0;
                if (e.code === 'KeyS') moveState.backward = 0;
                if (e.code === 'KeyA') moveState.left = 0;
                if (e.code === 'KeyD') moveState.right = 0;
            });

            // СЕНСОРНОЕ УПРАВЛЕНИЕ
            const joyContainer = document.getElementById('joystick-container');
            const joyKnob = document.getElementById('joystick-knob');

            renderer.domElement.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    // Если нажатие в правой части экрана - это обзор
                    if (touch.clientX > window.innerWidth / 2) {
                        lookTouchId = touch.identifier;
                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;
                    }
                }
            }, { passive: false });

            joyContainer.addEventListener('touchstart', (e) => {
                joystickActive = true;
                const touch = e.targetTouches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    
                    // Джойстик
                    if (joystickActive && touch.target.closest('#joystick-container')) {
                        let dx = touch.clientX - touchStartX;
                        let dy = touch.clientY - touchStartY;
                        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                        const angle = Math.atan2(dy, dx);
                        
                        const lx = Math.cos(angle) * dist;
                        const ly = Math.sin(angle) * dist;
                        
                        joyKnob.style.transform = `translate(calc(-50% + ${lx}px), calc(-50% + ${ly}px))`;
                        
                        moveState.forward = ly < 0 ? Math.abs(ly/50) : 0;
                        moveState.backward = ly > 0 ? Math.abs(ly/50) : 0;
                        moveState.left = lx < 0 ? Math.abs(lx/50) : 0;
                        moveState.right = lx > 0 ? Math.abs(lx/50) : 0;
                    }

                    // Обзор пальцем
                    if (touch.identifier === lookTouchId) {
                        const dx = touch.clientX - lastLookX;
                        const dy = touch.clientY - lastLookY;
                        yaw -= dx * 0.005;
                        pitch -= dy * 0.005;
                        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === lookTouchId) lookTouchId = null;
                }
                if (e.targetTouches.length === 0) {
                    joystickActive = false;
                    joyKnob.style.transform = `translate(-50%, -50%)`;
                    moveState.forward = moveState.backward = moveState.left = moveState.right = 0;
                }
            });
        }

        function createHallucinations() {
            for(let i=0; i<15; i++) {
                const group = new THREE.Group();
                const mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.1), mat);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.1), mat);
                head.position.y = 0.35;
                group.add(body, head);
                group.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*4, (Math.random()-0.5)*8);
                group.visible = false;
                scene.add(group);
                hallucinations.push({ mesh: group, material: mat, seed: Math.random()*10 });
            }
        }

        function setupPostProcessing() {
            postMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: null },
                    time: { value: 0 },
                    progress: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float time;
                    uniform float progress;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        float p = progress / 100.0;
                        
                        // Марево
                        float distStrength = (progress < 10.0) ? (p * 0.005) : (p * 0.025);
                        if (progress >= 100.0) distStrength = 0.004;
                        uv.x += sin(uv.y * 15.0 + time * 3.0) * distStrength;
                        uv.y += cos(uv.x * 15.0 + time * 3.0) * distStrength;

                        // Туннель (50-80%)
                        if (progress >= 50.0 && progress < 80.0) {
                            float tp = (progress - 50.0) / 30.0;
                            uv = 0.5 + (uv - 0.5) * (1.0 - sin(tp * 3.14) * 0.15);
                        }

                        vec4 color = texture2D(tDiffuse, uv);

                        // Контраст (от 10%)
                        if (progress >= 10.0 && progress < 100.0) {
                            float contrast = 1.0 + (progress - 10.0) * 0.025;
                            color.rgb = (color.rgb - 0.5) * contrast + 0.5;
                        }
                        gl_FragColor = color;
                    }
                `
            });
            composerScene = new THREE.Scene();
            composerCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            composerScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMaterial));
        }

        const raycaster = new THREE.Raycaster();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Вращение камеры
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // Перемещение
            const speed = 4 * delta;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();

            if (moveState.forward) camera.position.addScaledVector(dir, speed * moveState.forward);
            if (moveState.backward) camera.position.addScaledVector(dir, -speed * moveState.backward);
            if (moveState.left) camera.position.addScaledVector(side, speed * moveState.left);
            if (moveState.right) camera.position.addScaledVector(side, -speed * moveState.right);

            // Стены
            camera.position.x = Math.max(-4.5, Math.min(4.5, camera.position.x));
            camera.position.z = Math.max(-4.5, Math.min(4.5, camera.position.z));

            // Прогресс
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(scene.children);
            isLookingAtPainting = hits.some(h => h.object.name === "painting");
            if (isLookingAtPainting && progress < 100) progress += delta * 6;
            
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('status-text').innerText = `ОСТАНОВКА МИРА: ${Math.floor(progress)}%`;

            // Визуал
            hallucinations.forEach(h => {
                if (progress >= 20 && progress < 50) {
                    h.mesh.visible = true;
                    if (progress < 35) {
                        h.material.color.set(0x888888);
                        h.material.opacity = (progress - 20) / 15 * 0.4;
                    } else {
                        h.material.color.setHSL((h.seed + time * 0.1) % 1, 0.6, 0.5);
                        h.material.opacity = 0.7;
                        h.mesh.position.y += Math.sin(time + h.seed) * 0.005;
                    }
                } else h.mesh.visible = false;
            });

            if (progress >= 80) {
                const texLoader = new THREE.TextureLoader();
                const alt = texLoader.load(TEXTURE_NEW_REALITY);
                alt.wrapS = alt.wrapT = THREE.RepeatWrapping;
                alt.repeat.set(2, 2);
                if (progress >= 99) {
                    roomMaterials.forEach(m => { if(m.map) m.map = alt; });
                }
            }

            // Рендер с эффектами
            const target = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            renderer.setRenderTarget(target);
            renderer.render(scene, camera);
            postMaterial.uniforms.tDiffuse.value = target.texture;
            postMaterial.uniforms.progress.value = progress;
            postMaterial.uniforms.time.value = time;
            renderer.setRenderTarget(null);
            renderer.render(composerScene, composerCamera);
            target.dispose();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
