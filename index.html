<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вхождение в сумрак - Heat Haze Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; touch-action: none; }
        
        /* Шкала прогресса */
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 70%; text-align: center; color: white; pointer-events: none; z-index: 5;
        }
        #progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: #ff4500; box-shadow: 0 0 10px #ff4500; }
        #percent { font-size: 12px; margin-top: 5px; letter-spacing: 1px; }

        /* Зона джойстика */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; z-index: 10;
        }

        /* Заставка */
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
        }
        button {
            padding: 15px 30px; background: none; border: 2px solid white;
            color: white; font-size: 18px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="blocker">
    <h1 style="letter-spacing: 5px;">СУМРАК</h1>
    <p style="font-size: 14px; color: #888;">Слева: Движение | Справа: Обзор</p>
    <button id="start-button">ВОЙТИ</button>
</div>

<div id="ui">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="percent">0%</div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
    import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
    import { ShaderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/ShaderPass.js';

    let camera, scene, renderer, composer, heatPass, pictureMesh;
    let progression = 0;
    let isMoving = false;
    let moveDir = { x: 0, z: 0 };

    // Управление камерой
    let lon = 0, lat = 0;
    let startX = 0, startY = 0, startLon = 0, startLat = 0;

    const loader = new THREE.TextureLoader();

    // Шейдер горячего воздуха (Heat Haze)
    const HeatHazeShader = {
        uniforms: {
            "tDiffuse": { value: null },
            "time": { value: 0.0 },
            "intensity": { value: 0.0 }
        },
        vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform float time;
            uniform float intensity;
            varying vec2 vUv;
            void main() {
                vec2 uv = vUv;
                float offset = sin(uv.y * 50.0 + time * 5.0) * 0.003 * intensity;
                offset += sin(uv.x * 30.0 + time * 3.0) * 0.002 * intensity;
                gl_FragColor = texture2D(tDiffuse, uv + offset);
            }
        `
    };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        renderer = new THREE.WebGLRenderer({ antialias: false }); // Отключаем для скорости на мобилках
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Пост-процессинг
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        
        heatPass = new ShaderPass(HeatHazeShader);
        composer.addPass(heatPass);

        // Свет
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);
        const point = new THREE.PointLight(0xffffff, 10);
        point.position.set(0, 3, 0);
        scene.add(point);

        // Комната
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 12), wallMat);
        room.position.y = 2.5;
        scene.add(room);

        // Картина (цель)
        const picGeom = new THREE.PlaneGeometry(2, 2.5);
        const picMat = new THREE.MeshStandardMaterial({ 
            color: 0x444444, 
            emissive: 0x000000 
        });
        pictureMesh = new THREE.Mesh(picGeom, picMat);
        pictureMesh.position.set(0, 1.8, -5.9);
        pictureMesh.name = "target";
        scene.add(pictureMesh);

        setupControls();
    }

    function setupControls() {
        // Джойстик
        const joy = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white',
            multitouch: true
        });

        joy.on('move', (e, data) => {
            isMoving = true;
            moveDir.z = -data.vector.y * 0.08;
            moveDir.x = data.vector.x * 0.08;
        });

        joy.on('end', () => {
            isMoving = false;
            moveDir = { x: 0, z: 0 };
        });

        // Сенсорный обзор (правая часть)
        const handleTouchStart = (e) => {
            const t = e.touches[0];
            if (t.clientX > window.innerWidth / 2) {
                startX = t.clientX; startY = t.clientY;
                startLon = lon; startLat = lat;
                document.addEventListener('touchmove', handleTouchMove, { passive: false });
                document.addEventListener('touchend', handleTouchEnd);
            }
        };

        const handleTouchMove = (e) => {
            const t = e.touches[0];
            lon = (startX - t.clientX) * 0.2 + startLon;
            lat = (t.clientY - startY) * 0.2 + startLat;
            lat = Math.max(-85, Math.min(85, lat));
        };

        const handleTouchEnd = () => {
            document.removeEventListener('touchmove', handleTouchMove);
        };

        document.addEventListener('touchstart', handleTouchStart, { passive: false });

        document.getElementById('start-button').onclick = () => {
            document.getElementById('blocker').style.display = 'none';
        };
    }

    function animate() {
        requestAnimationFrame(animate);

        // Вращение камеры
        let phi = THREE.MathUtils.degToRad(90 - lat);
        let theta = THREE.MathUtils.degToRad(lon);
        const target = new THREE.Vector3();
        target.setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        // Движение
        if (isMoving) {
            camera.translateZ(moveDir.z);
            camera.translateX(moveDir.x);
            camera.position.y = 1.7; // Фикс высоты
        }

        // Логика прогресса
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(
