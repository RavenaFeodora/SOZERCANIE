<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Room - Hallucinations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 350px;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        #progress-container {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            margin-top: 8px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #0099ff);
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.2s ease-out;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            z-index: 20;
            display: none;
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #instructions {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            color: white;
            text-align: center;
            z-index: 1000;
            padding: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #00ffcc;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>Остановка Мира</h1>
        <p>Смотрите на картину, чтобы изменить реальность</p>
        <p style="opacity: 0.6; font-size: 0.9rem;">(Зажмите и тяните левую часть экрана для ходьбы, правую для обзора)</p>
        <button onclick="startGame()">НАЧАТЬ</button>
    </div>

    <div id="ui">
        <div id="status-text">ОСТАНОВКА МИРА: 0%</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <script>
        // Ассеты
        const ASSETS = {
            floor: 'i (2).jpeg',
            wall: 'photo-wall-texture-pattern_58702-12902.jpg',
            painting1: 'InShot_20260322_110800776.jpg',
            painting2: 'InShot_20260323_200302907.jpg',
            hallu1: 'InShot_20260323_195718005.png',
            hallu2: 'InShot_20260323_195649894.png',
            finalWall: 'i.jpeg',
            finalFloor: 'detailed-close-up-view-on-a-forest-ground-texture-with-moss-and-branches-photo.jpg',
            finalSky: 'bright-clear-blue-sky-with-clouds-sunny-day_102814-6174.jpg'
        };

        let scene, camera, renderer, clock, paintingMesh;
        let progress = 0; 
        let isLooking = false;
        let hallucinations = [];
        let postMaterial, compScene, compCam;
        let roomWalls = [], roomFloor, roomCeiling;

        const moveState = { f: 0, b: 0, l: 0, r: 0 };
        let yaw = 0, pitch = 0;
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        let joyActive = false, joyStart = {x:0, y:0}, lookId = null, lastLX = 0, lastLY = 0;

        const textureLoader = new THREE.TextureLoader();

        function startGame() {
            document.getElementById('instructions').style.display = 'none';
            if (!isTouch) document.body.requestPointerLock();
            init();
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Создание комнаты
            const wallTex = textureLoader.load(ASSETS.wall);
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
            wallTex.repeat.set(2, 1);

            const floorTex = textureLoader.load(ASSETS.floor);
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(3, 3);

            // Стены (отдельные меши для плавного перехода)
            const wallGeo = new THREE.PlaneGeometry(10, 6);
            for(let i=0; i<4; i++) {
                const mat = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.DoubleSide });
                const w = new THREE.Mesh(wallGeo, mat);
                if(i===0) w.position.set(0, 0, -5);
                if(i===1) { w.position.set(0, 0, 5); w.rotation.y = Math.PI; }
                if(i===2) { w.position.set(-5, 0, 0); w.rotation.y = Math.PI/2; }
                if(i===3) { w.position.set(5, 0, 0); w.rotation.y = -Math.PI/2; }
                scene.add(w);
                roomWalls.push(w);
            }

            roomFloor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ map: floorTex }));
            roomFloor.rotation.x = -Math.PI/2;
            roomFloor.position.y = -3;
            scene.add(roomFloor);

            roomCeiling = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            roomCeiling.rotation.x = Math.PI/2;
            roomCeiling.position.y = 3;
            scene.add(roomCeiling);

            // Картина
            const pTex1 = textureLoader.load(ASSETS.painting1);
            paintingMesh = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), new THREE.MeshStandardMaterial({ map: pTex1 }));
            paintingMesh.position.set(0, 0.5, -4.98);
            paintingMesh.name = "target";
            scene.add(paintingMesh);

            createHallu();
            setupPost();
            setupInput();

            if(isTouch) document.getElementById('joystick-container').style.display = 'block';
            animate();
        }

        function createHallu() {
            const hTexs = [textureLoader.load(ASSETS.hallu1), textureLoader.load(ASSETS.hallu2)];
            for(let i=0; i<12; i++) {
                const mat = new THREE.MeshBasicMaterial({ 
                    map: hTexs[i % 2], 
                    transparent: true, 
                    opacity: 0,
                    depthWrite: false
                });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(0.8, 1.2, 1);
                sprite.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*4, (Math.random()-0.5)*8);
                sprite.visible = false;
                scene.add(sprite);
                hallucinations.push({ mesh: sprite, mat: mat, seed: Math.random()*10 });
            }
        }

        function setupPost() {
            postMaterial = new THREE.ShaderMaterial({
                uniforms: { tDiffuse: {value:null}, time: {value:0}, progress: {value:0} },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float time;
                    uniform float progress;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        float p = progress / 100.0;
                        
                        // Марево (замедленное и зависящее от %)
                        float dist = (progress < 10.0) ? (p * 0.003) : (p * 0.02);
                        if (progress >= 100.0) dist = 0.003; 
                        
                        uv.x += sin(uv.y * 12.0 + time * 1.5) * dist;
                        uv.y += cos(uv.x * 12.0 + time * 1.5) * dist;

                        // Туннель (50-80%)
                        if (progress >= 50.0 && progress < 80.0) {
                            float tp = (progress - 50.0) / 30.0;
                            uv = 0.5 + (uv - 0.5) * (1.0 - sin(tp * 3.1415) * 0.2);
                        }

                        vec4 col = texture2D(tDiffuse, uv);

                        // Контраст (от 10% до 100%)
                        if (progress >= 10.0 && progress < 100.0) {
                            float c = 1.0 + (progress - 10.0) * 0.02;
                            col.rgb = (col.rgb - 0.5) * c + 0.5;
                        }
                        gl_FragColor = col;
                    }
                `
            });
            compScene = new THREE.Scene();
            compCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            compScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMaterial));
        }

        function setupInput() {
            if(!isTouch) {
                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        yaw -= e.movementX * 0.002;
                        pitch -= e.movementY * 0.002;
                        pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if(e.code==='KeyW') moveState.f=1; if(e.code==='KeyS') moveState.b=1;
                    if(e.code==='KeyA') moveState.l=1; if(e.code==='KeyD') moveState.r=1;
                });
                document.addEventListener('keyup', (e) => {
                    if(e.code==='KeyW') moveState.f=0; if(e.code==='KeyS') moveState.b=0;
                    if(e.code==='KeyA') moveState.l=0; if(e.code==='KeyD') moveState.r=0;
                });
            } else {
                const jc = document.getElementById('joystick-container');
                const jk = document.getElementById('joystick-knob');
                
                renderer.domElement.addEventListener('touchstart', (e) => {
                    for(let t of e.changedTouches) {
                        if(t.clientX > window.innerWidth/2) { lookId = t.identifier; lastLX = t.clientX; lastLY = t.clientY; }
                    }
                });
                jc.addEventListener('touchstart', (e) => {
                    joyActive = true; joyStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
                });
                window.addEventListener('touchmove', (e) => {
                    for(let t of e.changedTouches) {
                        if(joyActive && t.target.closest('#joystick-container')) {
                            let dx = t.clientX - joyStart.x, dy = t.clientY - joyStart.y;
                            let d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                            let a = Math.atan2(dy, dx);
                            let lx = Math.cos(a)*d, ly = Math.sin(a)*d;
                            jk.style.transform = `translate(calc(-50% + ${lx}px), calc(-50% + ${ly}px))`;
                            moveState.f = ly < 0 ? Math.abs(ly/40) : 0;
                            moveState.b = ly > 0 ? Math.abs(ly/40) : 0;
                            moveState.l = lx < 0 ? Math.abs(lx/40) : 0;
                            moveState.r = lx > 0 ? Math.abs(lx/40) : 0;
                        }
                        if(t.identifier === lookId) {
                            yaw -= (t.clientX - lastLX) * 0.006;
                            pitch -= (t.clientY - lastLY) * 0.006;
                            pitch = Math.max(-1.5, Math.min(1.5, pitch));
                            lastLX = t.clientX; lastLY = t.clientY;
                        }
                    }
                });
                window.addEventListener('touchend', () => { joyActive = false; lookId = null; jk.style.transform='translate(-50%,-50%)'; Object.keys(moveState).forEach(k=>moveState[k]=0); });
            }
        }

        const ray = new THREE.Raycaster();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const speed = 3.5 * dt;
            const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera); fwd.y = 0; fwd.normalize();
            const rgt = new THREE.Vector3(1,0,0).applyQuaternion(camera); rgt.y = 0; rgt.normalize();
            
            if(moveState.f) camera.position.addScaledVector(fwd, speed * moveState.f);
            if(moveState.b) camera.position.addScaledVector(fwd, -speed * moveState.b);
            if(moveState.l) camera.position.addScaledVector(rgt, -speed * moveState.l);
            if(moveState.r) camera.position.addScaledVector(rgt, speed * moveState.r);

            camera.position.x = Math.max(-4.4, Math.min(4.4, camera.position.x));
            camera.position.z = Math.max(-4.4, Math.min(4.4, camera.position.z));

            // Логика прогресса (замедлено до delta * 2.0 вместо 6.0)
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            isLooking = hits.some(h => h.object.name === "target");
            
            if(isLooking && progress < 100) progress += dt * 2.2; 
            
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('status-text').innerText = `ОСТАНОВКА МИРА: ${Math.floor(progress)}%`;

            // 50%: Смена картины
            if (progress >= 50 && paintingMesh.userData.swapped !== true) {
                paintingMesh.material.map = textureLoader.load(ASSETS.painting2);
                paintingMesh.userData.swapped = true;
            }

            // Галлюцинации
            hallucinations.forEach(h => {
                if(progress >= 20 && progress < 50) {
                    h.mesh.visible = true;
                    if(progress < 35) {
                        h.mat.opacity = (progress-20)/15 * 0.3;
                        h.mat.color.set(0x888888);
                    } else {
                        h.mat.opacity = 0.8;
                        h.mat.color.setHSL((h.seed + time*0.1)%1, 0.5, 0.5);
                        h.mesh.position.y += Math.sin(time + h.seed)*0.005;
                    }
                } else h.mesh.visible = false;
            });

            // 90-100%: Финальная трансформация
            if(progress >= 85) {
                const alpha = Math.min(1, (progress - 85) / 15);
                
                // Стены -> Лес/i.jpeg
                const finalWallTex = textureLoader.load(ASSETS.finalWall);
                finalWallTex.wrapS = finalWallTex.wrapT = THREE.RepeatWrapping;
                finalWallTex.repeat.set(2,1);

                roomWalls.forEach(w => {
                    if(!w.userData.final) {
                        w.material.map = finalWallTex;
                        w.userData.final = true;
                    }
                    w.material.opacity = 1.0; 
                });

                // Пол -> Мох
                if(!roomFloor.userData.final) {
                    const fTex = textureLoader.load(ASSETS.finalFloor);
                    fTex.wrapS = fTex.wrapT = THREE.RepeatWrapping; fTex.repeat.set(4,4);
                    roomFloor.material.map = fTex;
                    roomFloor.userData.final = true;
                }

                // Потолок -> Небо
                if(!roomCeiling.userData.final) {
                    roomCeiling.material.map = textureLoader.load(ASSETS.finalSky);
                    roomCeiling.material.color.set(0xffffff);
                    roomCeiling.userData.final = true;
                }

                // Исчезновение картины на 100%
                if(progress >= 98) paintingMesh.visible = false;
            }

            // Рендер
            const rt = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
            renderer.setRenderTarget(rt);
            renderer.render(scene, camera);
            postMaterial.uniforms.tDiffuse.value = rt.texture;
            postMaterial.uniforms.progress.value = progress;
            postMaterial.uniforms.time.value = time;
            renderer.setRenderTarget(null);
            renderer.render(compScene, compCam);
            rt.dispose();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
