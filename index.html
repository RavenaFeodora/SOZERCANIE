<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вхождение в сумрак - Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Интерфейс шкалы */
        #ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; color: white; pointer-events: none; z-index: 5;
        }
        #progress-container {
            width: 100%; height: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3); margin-top: 5px;
        }
        #progress-bar { width: 0%; height: 100%; background: #ff4500; }
        #percent { font-size: 14px; margin-top: 2px; }

        /* Джойстик (будет слева) */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; z-index: 10;
        }

        /* Инструкция */
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="blocker">
    <h2>СОЗЕРЦАНИЕ</h2>
    <p>СТАРТ</p>
    <p style="font-size: 12px; color: #ccc;">Слева — джойстик для ходьбы<br>Справа — вращение камерой пальцем</p>
</div>

<div id="ui">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="percent">0%</div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

    let camera, scene, renderer, pictureMesh, wallMaterial;
    let progression = 0;
    let isMoving = false;
    let moveDirection = { x: 0, z: 0 };
    let rotationSpeed = 0.005;

    // Параметры камеры для мобильного вращения
    let lon = 0, lat = 0, phi = 0, theta = 0;
    let onPointerDownPointerX = 0, onPointerDownPointerY = 0;
    let onPointerDownLon = 0, onPointerDownLat = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const spot = new THREE.SpotLight(0xfff0dd, 5, 15, Math.PI/6);
        spot.position.set(0, 4, 2);
        scene.add(spot);

        const loader = new THREE.TextureLoader();

        // Пол и Стены (упрощенная загрузка)
        const wallTex = loader.load('photo-wall-texture-pattern_58702-12902.jpg');
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(4, 2);
        wallMaterial = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide });
        const room = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 12), wallMaterial);
        room.position.y = 2.5;
        scene.add(room);

        // Картина
        loader.load('InShot_20260322_110800776.jpg', (tex) => {
            const aspect = tex.image.width / tex.image.height;
            pictureMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(2 * aspect, 2),
                new THREE.MeshStandardMaterial({ map: tex })
            );
            pictureMesh.position.set(0, 1.8, -5.9);
            pictureMesh.name = "target_picture";
            scene.add(pictureMesh);
        });

        // --- МОБИЛЬНОЕ УПРАВЛЕНИЕ ---

        // 1. Джойстик для ходьбы
        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '60px', bottom: '60px' },
            color: 'white'
        });

        joystick.on('move', (evt, data) => {
            isMoving = true;
            const forward = data.vector.y;
            const side = data.vector.x;
            moveDirection.z = -forward * 0.1;
            moveDirection.x = side * 0.1;
        });

        joystick.on('end', () => {
            isMoving = false;
            moveDirection = { x: 0, z: 0 };
        });

        // 2. Вращение камеры пальцем (правая часть экрана)
        document.addEventListener('pointerdown', (e) => {
            if (e.clientX > window.innerWidth / 2) {
                onPointerDownPointerX = e.clientX;
                onPointerDownPointerY = e.clientY;
                onPointerDownLon = lon;
                onPointerDownLat = lat;
                document.addEventListener('pointermove', onPointerMove);
                document.addEventListener('pointerup', onPointerUp);
            }
        });

        document.getElementById('blocker').onclick = () => {
            document.getElementById('blocker').style.display = 'none';
        };
    }

    function onPointerMove(e) {
        isMoving = true;
        lon = (onPointerDownPointerX - e.clientX) * 0.1 + onPointerDownLon;
        lat = (e.clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat;
        lat = Math.max(-85, Math.min(85, lat));
    }

    function onPointerUp() {
        isMoving = false;
        document.removeEventListener('pointermove', onPointerMove);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Обновление вращения камеры
        phi = THREE.MathUtils.degToRad(90 - lat);
        theta = THREE.MathUtils.degToRad(lon);
        const target = new THREE.Vector3();
        target.setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        // Движение
        if (isMoving) {
            camera.translateZ(moveDirection.z);
            camera.translateX(moveDirection.x);
            camera.position.y = 1.7; // фиксация высоты
        }

        // Логика прогресса
        checkProgression();
        renderer.render(scene, camera);
    }

    function checkProgression() {
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(scene.children);
        const lookingAtPic = intersects.length > 0 && intersects[0].object.name === "target_picture";

        if (!isMoving && lookingAtPic) {
            progression = Math.min(progression + 0.4, 100);
        } else {
            progression = Math.max(progression - 1.5, 0);
        }

        document.getElementById('progress-bar').style.width = progression + '%';
        document.getElementById('percent').innerText = Math.floor(progression) + '%';
        
        applyVisuals(progression);
    }

    function applyVisuals(p) {
        // Здесь используется та же логика стадий, что и в прошлом ответе
        // (Для краткости оставил только самые важные эффекты)
        const time = Date.now() * 0.001;
        
        if (p > 10 && p < 25) {
            pictureMesh.material.emissive = new THREE.Color(0xff0000);
            pictureMesh.material.emissiveIntensity = (p - 10) * 0.2;
        } 
        
        if (p >= 25 && p < 50) {
            const blur = (p - 25) / 5;
            document.body.style.filter = `blur(${blur}px) hue-rotate(${p*2}deg)`;
        } else if (p < 25) {
            document.body.style.filter = "none";
        }

        if (p >= 90) {
            document.body.style.filter = "invert(1) contrast(2)";
        }
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
