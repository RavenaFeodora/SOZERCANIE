<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вхождение в сумрак</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; color: white; pointer-events: none; z-index: 5;
        }
        #progress-container { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid #fff; }
        #progress-bar { width: 0%; height: 100%; background: red; transition: width 0.1s; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10; }
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            color: white; display: flex; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="blocker">старт</div>
<div id="crosshair"></div>
<div id="ui">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="percent">0%</div>
</div>
<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

    let scene, camera, renderer, picture, wall, floor;
    let progression = 0;
    let isMoving = false;
    let moveDir = { x: 0, z: 0 };
    let lon = 0, lat = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 3); // Игрок чуть дальше от стены

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();

        // 1. СТЕНЫ (Твоя текстура кирпича 1000033049.jpg)
        const wallTex = loader.load('1000033049.jpg');
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(4, 2);
        const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide });
        wall = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 10), wallMat);
        wall.position.y = 2.5;
        scene.add(wall);

        // 2. ПОЛ (Твоя текстура плитки 1000033050.jpg)
        const floorTex = loader.load('1000033050.jpg');
        floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
        floorTex.repeat.set(5, 5);
        const floorMat = new THREE.MeshStandardMaterial({ map: floorTex });
        floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // 3. КАРТИНА (1000033048.jpg)
        loader.load('1000033048.jpg', (tex) => {
            const aspect = tex.image.width / tex.image.height;
            picture = new THREE.Mesh(
                new THREE.PlaneGeometry(2 * aspect, 2),
                new THREE.MeshStandardMaterial({ map: tex, emissive: 0x000000 })
            );
            picture.position.set(0, 1.8, -4.9); // Прямо на передней стене
            picture.name = "target";
            scene.add(picture);
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // Управление
        const joystick = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'} });
        joystick.on('move', (e, data) => { 
            isMoving = true; 
            moveDir.z = -data.vector.y * 0.1; 
            moveDir.x = data.vector.x * 0.1; 
        });
        joystick.on('end', () => { isMoving = false; moveDir = {x:0, z:0}; });

        document.addEventListener('pointermove', (e) => {
            if (e.buttons > 0 || e.pointerType === 'touch') { // Вращение при касании правой части
                if (e.clientX > window.innerWidth / 2) {
                    isMoving = true;
                    lon -= e.movementX * 0.2;
                    lat = Math.max(-85, Math.min(85, lat + e.movementY * 0.2));
                    setTimeout(() => isMoving = false, 100);
                }
            }
        });

        document.getElementById('blocker').onclick = () => document.getElementById('blocker').style.display = 'none';
    }

    function animate() {
        requestAnimationFrame(animate);

        // Вращение камеры
        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);
        const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        // Движение
        if (isMoving) {
            camera.translateZ(moveDir.z);
            camera.translateX(moveDir.x);
            camera.position.y = 1.7;
        }

        // Логика "Остановки мира"
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const hit = raycaster.intersectObjects(scene.children);
        const isLooking = hit.length > 0 && hit[0].object.name === "target";

        if (!isMoving && isLooking) {
            progression = Math.min(progression + 0.3, 100);
        } else {
            progression = Math.max(progression - 1.0, 0);
        }

        renderEffects();
        renderer.render(scene, camera);
    }

    function renderEffects() {
        document.getElementById('progress-bar').style.width = progression + '%';
        document.getElementById('percent').innerText = Math.floor(progression) + '%';
        
        const p = progression;
        const body = document.body.style;

        if (p < 1) { body.filter = "none"; return; }

        // 1-10%: Легкое размытие
        if (p >= 1 && p < 10) body.filter = `blur(${p/5}px) brightness(${1 + p/20})`;
        
        // 10-25%: Эффект сумрака (Красный контраст как на твоем фото)
        if (p >= 10 && p < 25) {
            body.filter = `contrast(${1 + p/10}) saturate(${p}) sepia(1) hue-rotate(-50deg) brightness(0.8)`;
        }

        // 25-50%: Сильное искажение (всё плывёт)
        if (p >= 25 && p < 50) {
            body.filter = `blur(${(p-25)/2}px) hue-rotate(${p*4}deg) saturate(2)`;
            if (picture) picture.scale.set(1 + Math.sin(Date.now()*0.01)*0.2, 1, 1);
        }

        // 50-90%: Наслоение реальности
        if (p >= 50 && p < 90) {
            body.filter = `invert(${(p-50)/40}) contrast(2) hue-rotate(180deg)`;
        }

        // 90-100%: Другая реальность
        if (p >= 90) body.filter = "invert(1) hue-rotate(90deg) saturate(5)";
    }
</script>
</body>
</html>
